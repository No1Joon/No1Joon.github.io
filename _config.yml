title: No1Joon's Tech Blog
description: 기술 스택, 아키텍처, 개발 경험을 기록하는 블로그
baseurl: ""
url: "https://No1Joon.github.io"
author: No1Joon

markdown: kramdown
highlighter: rouge
permalink: /posts/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - .claude/
  - README.md
  - Gemfile
  - Gemfile.lock
