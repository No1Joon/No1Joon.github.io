title: No1Joon's Tech Blog
description: 기술 스택, 아키텍처, 개발 경험을 기록하는 블로그
baseurl: ""
url: "https://no1joon.github.io"
lang: ko
logo: /assets/og-default.png
image: /assets/og-default.png

author:
  name: No1Joon
  url: https://github.com/No1Joon

social:
  name: No1Joon
  links:
    - https://github.com/No1Joon

markdown: kramdown
highlighter: rouge
permalink: /posts/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - .claude/
  - .gemini/
  - README.md
  - Gemfile
  - Gemfile.lock
  - Tasks.md
  - api/
  - scripts/
  - node_modules/
  - vendor/
