<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="google-site-verification" content="EbllXhyf3VWQ6q7y4H5cPTMM7x3zW3uZLK0QnPA2mwM" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="inner">
      <a href="{{ '/' | relative_url }}" class="site-title">No1Joon<span>.dev</span></a>
      <nav>
        <a href="{{ '/' | relative_url }}">Posts</a>
        <a href="https://github.com/No1Joon" target="_blank">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>© {{ 'now' | date: "%Y" }} No1Joon — Built with Jekyll & GitHub Pages</p>
  </footer>
</body>
</html>
